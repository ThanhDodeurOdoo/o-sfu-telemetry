services:
  prometheus:
    image: prom/prometheus:v3.2.1
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=${PROMETHEUS_RETENTION_TIME:-15d}
      - --storage.tsdb.retention.size=${PROMETHEUS_RETENTION_SIZE:-2GB}
    extra_hosts:
      - host.docker.internal:host-gateway
    ports:
      - "127.0.0.1:9090:9090"
    restart: unless-stopped
    volumes:
      - ./prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - ./prometheus/recording-rules.yml:/etc/prometheus/recording-rules.yml:ro
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./data/prometheus:/prometheus

  grafana:
    image: grafana/grafana-oss:11.4.0
    depends_on:
      - prometheus
      - loki
      - tempo
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?set GRAFANA_ADMIN_PASSWORD}
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/operations.json
      GF_INSTALL_PLUGINS: yesoreyeram-infinity-datasource
    ports:
      - "127.0.0.1:3000:3000"
    restart: unless-stopped
    volumes:
      - ./data/grafana:/var/lib/grafana
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - ./grafana/provisioning:/etc/grafana/provisioning:ro

  alertmanager:
    image: prom/alertmanager:v0.28.1
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
    ports:
      - "127.0.0.1:9093:9093"
    restart: unless-stopped
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro

  blackbox-exporter:
    image: prom/blackbox-exporter:v0.26.0
    command:
      - --config.file=/etc/blackbox_exporter/config.yml
    extra_hosts:
      - host.docker.internal:host-gateway
    ports:
      - "127.0.0.1:9115:9115"
    restart: unless-stopped
    volumes:
      - ./blackbox/blackbox.yml:/etc/blackbox_exporter/config.yml:ro

  node-exporter:
    image: prom/node-exporter:v1.9.1
    profiles:
      - linux-infra
    ports:
      - "127.0.0.1:9100:9100"
    command:
      - --path.rootfs=/host
    restart: unless-stopped
    volumes:
      - /:/host:ro,rslave

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.52.1
    profiles:
      - linux-infra
    ports:
      - "127.0.0.1:8081:8080"
    privileged: true
    restart: unless-stopped
    devices:
      - /dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:rw
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.123.0
    depends_on:
      - loki
      - tempo
    command:
      - --config=/etc/otelcol-contrib/config.yaml
    ports:
      - "127.0.0.1:4317:4317"
      - "127.0.0.1:4318:4318"
      - "127.0.0.1:13133:13133"
    restart: unless-stopped
    volumes:
      - ./otel-collector/config.yaml:/etc/otelcol-contrib/config.yaml:ro
      - ${O_SFU_LOG_DIR:-./data/logs}:/var/log/o-sfu:ro
      - ./data/otelcol:/var/lib/otelcol

  loki:
    image: grafana/loki:3.4.2
    command:
      - -config.file=/etc/loki/config.yaml
    ports:
      - "127.0.0.1:3100:3100"
    restart: unless-stopped
    volumes:
      - ./loki/config.yaml:/etc/loki/config.yaml:ro
      - ./data/loki:/var/lib/loki

  tempo:
    image: grafana/tempo:2.9.0
    command:
      - -config.file=/etc/tempo/config.yaml
    ports:
      - "127.0.0.1:3200:3200"
    restart: unless-stopped
    volumes:
      - ./tempo/config.yaml:/etc/tempo/config.yaml:ro
      - ./data/tempo:/var/tempo
