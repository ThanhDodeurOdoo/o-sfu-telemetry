x-logging: &default-logging
  driver: local
  options:
    max-size: "20m"
    max-file: "5"

services:
  prometheus:
    image: prom/prometheus:v3.13.0@sha256:c6b27ea434f8389bfe233fbc7be381cf50587c286e871bc842008f5a1b1908a7
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=${PROMETHEUS_RETENTION_TIME:-15d}
      - --storage.tsdb.retention.size=${PROMETHEUS_RETENTION_SIZE:-2GB}
    expose:
      - "9090"
    logging: *default-logging
    networks:
      - o-sfu
    restart: unless-stopped
    volumes:
      - ../../prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - ../../prometheus/recording-rules.yml:/etc/prometheus/recording-rules.yml:ro
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../../data/prometheus:/prometheus

  grafana:
    image: ${GRAFANA_IMAGE:?set GRAFANA_IMAGE}
    depends_on:
      - prometheus
      - loki
      - tempo
    environment:
      DIAGNOSTICS_AUTH_TOKEN: ${DIAGNOSTICS_AUTH_TOKEN:?set DIAGNOSTICS_AUTH_TOKEN}
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/operations.json
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?set GRAFANA_ADMIN_PASSWORD}
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_COOKIE_SECURE: "true"
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:?set GRAFANA_ROOT_URL}
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
    expose:
      - "3000"
    logging: *default-logging
    networks:
      - o-sfu
    restart: unless-stopped
    volumes:
      - ../../data/grafana:/var/lib/grafana
      - ../../grafana/dashboards:/var/lib/grafana/dashboards:ro
      - ../../grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ../../grafana/provisioning/datasources/prometheus.yml:/etc/grafana/provisioning/datasources/prometheus.yml:ro
      - ./grafana-infinity.yaml:/etc/grafana/provisioning/datasources/infinity.yaml:ro

  alertmanager:
    image: prom/alertmanager:v0.33.1@sha256:9e082985f56f4c8c9f724e18f2288c6708f472e56a5286b8863d080434ea065d
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
    expose:
      - "9093"
    logging: *default-logging
    networks:
      - o-sfu
    restart: unless-stopped
    secrets:
      - alertmanager_webhook_url
    volumes:
      - ../../alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro

  blackbox-exporter:
    image: prom/blackbox-exporter:v0.28.0@sha256:e753ff9f3fc458d02cca5eddab5a77e1c175eee484a8925ac7d524f04366c2fc
    entrypoint:
      - /bin/sh
      - -ec
    command:
      - |
        sed "s|__DIAGNOSTICS_AUTH_TOKEN__|$${DIAGNOSTICS_AUTH_TOKEN}|g" /etc/blackbox_exporter/config.template.yml > /tmp/blackbox.yml
        exec /bin/blackbox_exporter --config.file=/tmp/blackbox.yml
    environment:
      DIAGNOSTICS_AUTH_TOKEN: ${DIAGNOSTICS_AUTH_TOKEN:?set DIAGNOSTICS_AUTH_TOKEN}
    expose:
      - "9115"
    logging: *default-logging
    networks:
      - o-sfu
    restart: unless-stopped
    volumes:
      - ./blackbox.yml.template:/etc/blackbox_exporter/config.template.yml:ro

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.156.0@sha256:125bdbeb7590cc1952c5b3430ecf14063568980c2c93d5b38676cc0446ed8108
    depends_on:
      - loki
      - tempo
    command:
      - --config=/etc/otelcol-contrib/config.yaml
    expose:
      - "4317"
      - "4318"
      - "13133"
    logging: *default-logging
    networks:
      - o-sfu
    restart: unless-stopped
    user: "0:0"
    volumes:
      - ../../otel-collector/config.yaml:/etc/otelcol-contrib/config.yaml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ../../data/otelcol:/var/lib/otelcol

  loki:
    image: grafana/loki:3.7.3@sha256:70b9f699fc9bb868b62f1cfd4f787dfa50242f1fd92e6089787d5d7daea75fe8
    command:
      - -config.file=/etc/loki/config.yaml
    expose:
      - "3100"
    logging: *default-logging
    networks:
      - o-sfu
    restart: unless-stopped
    volumes:
      - ../../loki/config.yaml:/etc/loki/config.yaml:ro
      - ../../data/loki:/var/lib/loki

  tempo:
    image: grafana/tempo:3.0.2@sha256:cda87c212d8c584dc0b89e337e7ed648a5100feb657e5d528480ee4fa03dbbe3
    command:
      - -config.file=/etc/tempo/config.yaml
    expose:
      - "3200"
      - "4318"
    logging: *default-logging
    networks:
      - o-sfu
    restart: unless-stopped
    volumes:
      - ../../tempo/config.yaml:/etc/tempo/config.yaml:ro
      - ../../data/tempo:/var/tempo

networks:
  o-sfu:
    external: true
    name: o-sfu_default

secrets:
  alertmanager_webhook_url:
    file: ${ALERTMANAGER_WEBHOOK_URL_FILE:?set ALERTMANAGER_WEBHOOK_URL_FILE}
