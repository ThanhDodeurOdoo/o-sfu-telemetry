receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318
  filelog:
    include:
      - /var/log/o-sfu/*.jsonl
    start_at: end
    storage: file_storage
    include_file_path: true
    operators:
      - type: json_parser

extensions:
  file_storage:
    directory: /var/lib/otelcol/file_storage
    create_directory: true
  health_check:
    endpoint: 0.0.0.0:13133

processors:
  memory_limiter:
    check_interval: 1s
    limit_mib: 512
    spike_limit_mib: 128
  resource/o-sfu-logs:
    attributes:
      - key: service.name
        value: o-sfu
        action: upsert
  batch:

exporters:
  otlphttp/tempo:
    endpoint: http://tempo:4318
  otlphttp/loki:
    endpoint: http://loki:3100/otlp

service:
  extensions:
    - file_storage
    - health_check
  pipelines:
    traces:
      receivers:
        - otlp
      processors:
        - memory_limiter
        - batch
      exporters:
        - otlphttp/tempo
    logs:
      receivers:
        - filelog
      processors:
        - memory_limiter
        - resource/o-sfu-logs
        - batch
      exporters:
        - otlphttp/loki
