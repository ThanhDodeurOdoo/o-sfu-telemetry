groups:
  - name: o-sfu-phase-2
    rules:
      - alert: OSFUInstanceDown
        expr: up{job="o-sfu"} == 0
        for: 2m
        labels:
          severity: page
        annotations:
          summary: "o-sfu metrics endpoint is unavailable"
          description: "Prometheus cannot scrape /metrics on the o-sfu target."

      - alert: OSFUNoopProbeFailed
        expr: probe_success{job="o-sfu-noop"} == 0
        for: 2m
        labels:
          severity: page
        annotations:
          summary: "o-sfu noop probe is failing"
          description: "The blackbox probe cannot complete GET /v1/noop successfully."

      - alert: OSFUDiagnosticsProbeFailed
        expr: osfu:diagnostics_probe_success == 0
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "o-sfu diagnostics probe is failing"
          description: "The blackbox probe cannot complete GET /internal/diagnostics/summary with the configured diagnostics token."

      - alert: OSFUHandshakeRejectionSpike
        expr: sum(rate(osfu_ws_handshake_rejections_total[5m])) > 1
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "websocket handshake rejections are elevated"
          description: "Handshake rejections have stayed above 1 per second for 10 minutes."

      - alert: OSFUDisconnectChurn
        expr: sum(rate(osfu_transport_health_transitions_total{from="connected",to="disconnected"}[5m])) > 0.1
        for: 10m
        labels:
          severity: page
        annotations:
          summary: "transport disconnect churn is elevated"
          description: "Connected transports are transitioning to disconnected faster than the canary baseline."

      - alert: OSFURelayOverloadDrops
        expr: sum(rate(osfu_rtp_relay_overload_drops_total[5m])) > 0
        for: 5m
        labels:
          severity: page
        annotations:
          summary: "relay overload drops detected"
          description: "Relay fan-out is dropping packets because the bounded relay mailboxes are overloaded."

      - alert: OSFURoutingPressure
        expr: sum(rate(osfu_rtc_datagram_fallback_scans_total[5m])) > 0.5
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "datagram fallback scans are elevated"
          description: "Indexed datagram routing is missing often enough to trigger sustained fallback scans."

  - name: o-sfu-phase-6
    rules:
      - alert: OSFUJoinSuccessRatioLow
        expr: osfu:ws_join_success_ratio_5m < 0.9 and osfu:ws_join_attempts_rate_5m > 0.05
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "o-sfu join success ratio is degraded"
          description: "Accepted websocket joins are no longer progressing to joined users at the normal canary ratio."

      - alert: OSFUStartupFailuresSpike
        expr: osfu:ws_startup_failures_rate_5m > 0.02
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "o-sfu startup failures are elevated"
          description: "Startup or user-initialize failures are rising before websocket users reach the steady-state loop."

      - alert: OSFUWebSocketOutboundQueueOverflow
        expr: osfu:ws_outbound_queue_overflow_rate_5m > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "o-sfu websocket slow-consumer shutdowns are occurring"
          description: "At least one websocket outbound room-event queue overflowed, so the runtime is closing lagging users instead of buffering unbounded fanout."

      - alert: OSFUTransportDisconnectRatePerUserHigh
        expr: osfu:transport_disconnect_churn_per_user_5m > 0.05 and sum(osfu_transport_users_active) > 0
        for: 10m
        labels:
          severity: page
        annotations:
          summary: "o-sfu transport churn is high relative to active users"
          description: "Connected transports are dropping often enough that the canary no longer looks stable even after normalizing by active users."

      - alert: OSFUTransportCleanupFailures
        expr: osfu:transport_cleanup_unrecovered_failure_rate_5m > 0
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "o-sfu transport cleanup failures are unrecovered"
          description: "Room cleanup retries are reaching a terminal, queue-full, or retry-exhausted state instead of completing successfully."

      - alert: OSFULocalForwardingEfficiencyLow
        expr: osfu:local_forwarding_efficiency_ratio_5m < 0.6 and osfu:rtp_ingress_packets_rate_5m > 10
        for: 10m
        labels:
          severity: page
        annotations:
          summary: "o-sfu ingress is not turning into local forwarding"
          description: "Ingress RTP is arriving, but too little of it is reaching local RTC forwarding paths for the current single-node canary."

      - alert: OSFUIceDtlsEstablishmentLow
        expr: osfu:operator_boundary_ice_dtls > 0.5
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "o-sfu transport establishment is degraded"
          description: "Joined users are reaching ICE checking, but too few of them are reaching ICE completion or DTLS connected in the recent traffic window."

      - alert: OSFUJoinedWithoutDtlsGrowth
        expr: osfu:joined_minus_dtls_15m > 0
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "recent joined users are missing matching DTLS growth"
          description: "Recent joined-user growth is outpacing DTLS-connected growth, which usually means some browsers are reaching signaling but not completing the RTC transport path."

      - alert: OSFUDtlsWithoutIngress
        expr: osfu:operator_boundary_publisher_media > 0.5
        for: 10m
        labels:
          severity: page
        annotations:
          summary: "o-sfu has DTLS users without RTP ingress"
          description: "Recent DTLS-connected users are not turning into RTP ingress, which points at publish-side media attachment or network-path issues."
