groups:
  - name: o-sfu-phase-2
    rules:
      - alert: OSFUInstanceDown
        expr: up{job="o-sfu"} == 0
        for: 2m
        labels:
          severity: page
        annotations:
          summary: "o-sfu metrics endpoint is unavailable"
          description: "Prometheus cannot scrape /metrics on the o-sfu target."

      - alert: OSFUNoopProbeFailed
        expr: probe_success{job="o-sfu-noop"} == 0
        for: 2m
        labels:
          severity: page
        annotations:
          summary: "o-sfu noop probe is failing"
          description: "The blackbox probe cannot complete GET /v1/noop successfully."

      - alert: OSFUHandshakeRejectionSpike
        expr: sum(rate(osfu_ws_handshake_rejections_total[5m])) > 1
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "websocket handshake rejections are elevated"
          description: "Handshake rejections have stayed above 1 per second for 10 minutes."

      - alert: OSFUDisconnectChurn
        expr: sum(rate(osfu_transport_health_transitions_total{from="connected",to="disconnected"}[5m])) > 0.1
        for: 10m
        labels:
          severity: page
        annotations:
          summary: "transport disconnect churn is elevated"
          description: "Connected transports are transitioning to disconnected faster than the canary baseline."

      - alert: OSFURelayOverloadDrops
        expr: sum(rate(osfu_rtp_relay_overload_drops_total[5m])) > 0
        for: 5m
        labels:
          severity: page
        annotations:
          summary: "relay overload drops detected"
          description: "Relay fan-out is dropping packets because the bounded relay mailboxes are overloaded."

      - alert: OSFURoutingPressure
        expr: sum(rate(osfu_rtc_datagram_fallback_scans_total[5m])) > 0.5
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "datagram fallback scans are elevated"
          description: "Indexed datagram routing is missing often enough to trigger sustained fallback scans."

  - name: o-sfu-phase-6
    rules:
      - alert: OSFUJoinSuccessRatioLow
        expr: osfu:ws_join_success_ratio_5m < 0.9 and sum(rate(osfu_ws_connections_total{stage="accepted"}[5m])) > 0.05
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "o-sfu join success ratio is degraded"
          description: "Accepted websocket joins are no longer progressing to joined sessions at the normal canary ratio."

      - alert: OSFUStartupFailuresSpike
        expr: osfu:ws_startup_failures_rate_5m > 0.02
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "o-sfu startup failures are elevated"
          description: "Startup or session-initialize failures are rising before websocket sessions reach the steady-state loop."

      - alert: OSFUTransportDisconnectRatePerSessionHigh
        expr: osfu:transport_disconnect_churn_per_session_5m > 0.05 and sum(osfu_transport_sessions_active) > 0
        for: 10m
        labels:
          severity: page
        annotations:
          summary: "o-sfu transport churn is high relative to active sessions"
          description: "Connected transports are dropping often enough that the canary no longer looks stable even after normalizing by active sessions."

      - alert: OSFULocalForwardingEfficiencyLow
        expr: osfu:local_forwarding_efficiency_ratio_5m < 0.6 and sum(rate(osfu_rtp_packets_total{direction="ingress"}[5m])) > 10
        for: 10m
        labels:
          severity: page
        annotations:
          summary: "o-sfu ingress is not turning into local forwarding"
          description: "Ingress RTP is arriving, but too little of it is reaching local RTC forwarding paths for the current single-node canary."
