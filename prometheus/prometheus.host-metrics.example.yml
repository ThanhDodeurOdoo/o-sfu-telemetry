global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml
  - /etc/prometheus/recording-rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: o-sfu
    metrics_path: /metrics
    static_configs:
      - targets:
          - host.docker.internal:8070

  - job_name: o-sfu-noop
    metrics_path: /probe
    params:
      module:
        - http_2xx
      target:
        - http://host.docker.internal:8070/v1/noop
    static_configs:
      - targets:
          - blackbox-exporter:9115
    relabel_configs:
      - source_labels:
          - __param_target
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

  - job_name: o-sfu-diagnostics
    metrics_path: /probe
    params:
      module:
        - http_2xx_diagnostics
      target:
        - http://host.docker.internal:8070/internal/diagnostics/summary
    static_configs:
      - targets:
          - blackbox-exporter:9115
    relabel_configs:
      - source_labels:
          - __param_target
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

  - job_name: node
    static_configs:
      - targets:
          - node-exporter:9100

  - job_name: cadvisor
    static_configs:
      - targets:
          - cadvisor:8080
